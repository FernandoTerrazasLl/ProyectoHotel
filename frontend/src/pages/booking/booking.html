<section class="booking">
    <div class="booking__header">
        <div class="booking__title-btn">
            <h1 class="booking__title">Reservas</h1>
            <button type="button" class="booking__create-btn">
                <img src="/images/new-register-icon.svg" alt="icono nueva reserva" class="booking__create-icon">
                <span class="booking__create-text">Nueva Reserva</span>
            </button>
        </div>

        <div class="booking__search">
            <img src="/images/reservation__search_icon.svg" alt="icono buscar reserva" class="booking__search-icon">
            <input type="text" placeholder="Buscar por huesped..." class="booking__search-input">
        </div>
    </div>

    <div class="booking__list">

    </div>

    <div class="booking__form-background--hidden booking__form-background"><!-- Cambia de clase dinamicamente -->
        <div class="booking__form-container">
            <h2 class="booking__form-title">Nueva Reserva</h2>

            <form class="booking__form">
                <div class="booking__form-feedback booking__form-feedback--hidden" role="status" aria-live="polite"></div>

                <label class="booking__form-field">
                    <span class="booking__form-label">Huespedes</span>
                    <select name="guestIds" class="booking__form-input booking__form-input-select booking__form-input-select--multiple" multiple required>
                        <option value="">Seleccionar</option>
                    </select>
                </label>

                <label class="booking__form-field">
                    <span class="booking__form-label">Tipo de habitacion</span>
                    <select name="roomType" class="booking__form-input booking__form-input-select" required>
                        <option value="">Seleccionar</option>

                    </select>
                </label>

                <div class="booking__form-row">
                    <label class="booking__form-field">
                        <span class="booking__form-label">Fecha ingreso</span>
                        <input type="date" name="checkInDate" class="booking__form-input" required>
                    </label>

                    <label class="booking__form-field">
                        <span class="booking__form-label">Fecha salida</span>
                        <input type="date" name="checkOutDate" class="booking__form-input" required>
                    </label>
                </div>

                <label class="booking__form-field">
                    <span class="booking__form-label ">Habitacion</span>
                    <select name="room" id="" class="booking__form-input booking__form-input-select" required>
                        <option value="">Seleccionar</option>
                    </select>
                </label>

                <div class="booking__form-actions">
                    <button type="button" class="booking__form-cancel">Cancelar</button>
                    <button type="submit" class="booking__form-submit">Crear Reserva</button>
                </div>
            </form>
        </div>
    </div>
</section>
