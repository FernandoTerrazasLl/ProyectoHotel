<div class="confirm-dialog confirm-dialog--hidden" data-dialog>
    <div class="confirm-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message">
        <h3 id="confirm-dialog-title" class="confirm-dialog__title">Confirmar accion</h3>
        <p id="confirm-dialog-message" class="confirm-dialog__message">Estas seguro de realizar esta accion?</p>
        <div class="confirm-dialog__actions">
            <button type="button" class="confirm-dialog__btn confirm-dialog__btn--cancel" data-cancel>Cancelar</button>
            <button type="button" class="confirm-dialog__btn confirm-dialog__btn--confirm" data-confirm>Aceptar</button>
        </div>
    </div>
</div>
